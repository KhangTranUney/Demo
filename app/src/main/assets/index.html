<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CCT Deep Link Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 24px;
      background: #fafafa;
      color: #1f1f1f;
    }
    h1 { font-size: 20px; margin: 0 0 12px; }
    p { line-height: 1.5; }
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px;
      max-width: 480px;
      margin: 0 auto;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    button.btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 20px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
    }
    button.btn:active { background: #185abc; }
    code { background: #f1f3f4; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>CCT Deep Link Demo</h1>
    <p>This page is loaded inside a Chrome Custom Tab from the app's <code>assets/</code> folder.</p>
    <p>Tap the button below to invoke the <code>demoapp://callback</code> scheme. Chrome should hand off to the app and close this tab.</p>
    <button class="btn" onclick="window.location.href='demoapp://callback?token=asset&amp;from=html'">Return to app</button>
  </div>
</body>
</html>
